<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" placeholder="search by name" />
    <select id="clr">
        <option value="-1">---SELECT--</option>
        <option value="red">Red</option>
        <option value="khaki">khaki</option>
        <option value="tomato">tomato</option>
    </select>
    <table>
        <thead>
            <tr>
                <td>ID</td>
                 <td>Name</td>
                <td>Email</td>
                <td>Delete</td>
            </tr>
        </thead>
        <tbody id="userBody">
        </tbody>
    </table>

    <script>
        let tbody = document.getElementById("userBody");

        fetch(`https://jsonplaceholder.typicode.com/users/`)
        .then(response => response.json())
        .then(users => {
            users.forEach(user => {
                let tr = document.createElement("tr"); // <tr></tr>
                let td = document.createElement("td"); // <td></td>
                let text = document.createTextNode(user.id);
                td.appendChild(text); // <td>1</td>
                tr.append(td); // <tr><td>1</td></tr>

                td = document.createElement("td"); // <td></td>
                text = document.createTextNode(user.username);
                td.appendChild(text); // <td>Roger</td>
                tr.append(td); // <tr><td>1</td></tr>

                 td = document.createElement("td"); // <td></td>
                text = document.createTextNode(user.email);
                td.appendChild(text); // <td>Roger</td>
                tr.append(td); // <tr><td>1</td></tr>

                td = document.createElement("td"); // <td></td>
                btn = document.createElement("button");
                btn.setAttribute("class", "del");
                btn.textContent = "Delete";
                td.append(btn);
                tr.append(td);

                tbody.append(tr);
            });

            // listener
            function doRemove(event) {
                //target	The DOM element that originally triggered the event.
                console.log(event.target);
                event.target.parentNode.parentNode.remove();
            }

           // document.getElementsByTagName("button")
           document.querySelectorAll(".del").forEach(btn => {
            btn.addEventListener("click" , doRemove);
           });

           // document.querySelectorAll("tr")
          // document.querySelectorAll("tr.first > td")

           // document.querySelector("input['placeholder' ='search by name']")

        
        })

           function changeColor(evt) {
            // evt will be changeEvent
            // let selectElem = evt.target
            let selElem =  document.getElementById("clr");
            var value  = selElem.options[selElem.selectedIndex].value
            if(value !== "-1") {
                document.bgColor = value;
            }
           }
           
           document.getElementById("clr").addEventListener("change", changeColor);

        
    </script>
</body>
</html>
