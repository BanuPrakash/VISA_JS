    <script>
         function memoize(fn) {
             const cache = {};
            return function (...args) {
                const key = JSON.stringify(args);
                if (!cache[key]) {
                    cache[key] = fn(...args);
                }
            return cache[key];
        };
    }

       async function getUser(id) {
            console.log("Called!!!");
            const response = await fetch(`https://jsonplaceholder.typicode.com/users/${id}`);
            return response.json();
        }

        let memUser = memoize(getUser);




             console.time("first");
              memUser(4).then(console.log);
                console.timeEnd("first");
          
        

         console.time("sec");
               memUser(4).then(console.log);
                console.timeEnd("sec");


       
         console.time("third");
                 memUser(4).then(console.log);
                console.timeEnd("third");
         
    </script>
